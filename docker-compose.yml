services:
  kafka:
    image: bitnami/kafka:3.8
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  solace:
    image: solace/solace-pubsub-standard:latest
    shm_size: 1g
    ulimits:
      nofile:
        soft: 2448
        hard: 1048576
    ports:
      - "8082:8080"
      - "55555:55555"
    environment:
      - username_admin_globalaccesslevel=admin
      - username_admin_password=admin
      - system_scaling_maxconnectioncount=100

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=kafka
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/system/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app-solace:
    build: .
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=solace
      - TRADING_SOLACE_HOST=solace:55555
      - TRADING_SOLACE_VPN_NAME=default
      - TRADING_SOLACE_USERNAME=admin
      - TRADING_SOLACE_PASSWORD=admin
    depends_on:
      - solace
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/system/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
